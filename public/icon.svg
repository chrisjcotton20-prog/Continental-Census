<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Solid dark teal background matching the app surface -->
  <rect width="512" height="512" fill="#0c1f1f"/>

  <!-- Lucide Feather, scaled to fill ~75% of the canvas and centered.
       Source viewBox is 24×24; scaling by 16 puts the 24-unit glyph onto a
       384-unit footprint, offset 64 from each edge so it sits centered. -->
  <g transform="translate(64 64) scale(16)"
     fill="none"
     stroke="#fb923c"
     stroke-width="1.6"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
    <line x1="16" y1="8" x2="2" y2="22"/>
    <line x1="17.5" y1="15" x2="9" y2="15"/>
  </g>
</svg>
