<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Birder home-screen icon — light/fun palette matching the app banner.
       Sky-blue vertical gradient (#6cb8e4 -> #a8d8eb -> #f8d9a8) exactly as
       the dashboard banner and share card, with a soft cream feather and a
       coral accent quill. Replaces the old dark-teal + orange version. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6cb8e4"/>
      <stop offset="55%" stop-color="#a8d8eb"/>
      <stop offset="100%" stop-color="#f8d9a8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2a3445" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Lucide Feather. 24-unit glyph scaled by 11.5 -> 276-unit footprint,
       centered at offset 118. Whole glyph (incl. coral quill tip) stays
       inside the maskable safe zone (~80% center circle), so Android's
       circle/squircle crop never clips it. -->
  <g transform="translate(118 118) scale(11.5)"
     fill="none"
     stroke-width="1.7"
     stroke-linecap="round"
     stroke-linejoin="round"
     filter="url(#soft)">
    <g stroke="#fffaf0">
      <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
      <line x1="17.5" y1="15" x2="9" y2="15"/>
    </g>
    <line x1="16" y1="8" x2="2" y2="22" stroke="#ff6b6b"/>
  </g>
</svg>
